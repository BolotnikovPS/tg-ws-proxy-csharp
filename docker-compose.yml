# Образ с Docker Hub: https://hub.docker.com/r/pboldev/tg-ws-proxy
# Сборка из Dockerfile: см. docker-compose.build.yml
services:
  tg-ws-proxy:
    container_name: tg-ws-proxy
    image: pboldev/tg-ws-proxy:2.0.0
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${TG_PORT:-1080}:${TG_PORT:-1080}"
    command:
      - "--host"
      - "${TG_HOST:-0.0.0.0}"
      - "--port"
      - "${TG_PORT:-1080}"
      - "--dc-ip"
      - "${TG_DC_IP_1:-2:149.154.167.220}"
      - "--dc-ip"
      - "${TG_DC_IP_2:-4:149.154.167.91}"
      # Чтобы включить логирование:
      # - "--verbose"
      #
      # Чтобы указать лог-файл:
      # - "--log-path"
      # - "/app/logs/proxy.log"
      #
      # Чтобы добавить SOCKS5 auth (можно несколько):
      # - "--auth"
      # - "user1:pass1"
